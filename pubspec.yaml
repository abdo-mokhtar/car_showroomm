name: car_showroom
description: Car Showroom Management System
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Database
  sqflite_common_ffi: ^2.3.4
  path: ^1.9.0
  path_provider: ^2.1.4

  # State Management
  flutter_bloc: ^9.1.1
  equatable: ^2.0.5

  # Localization
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

  # UI & Charts
  fl_chart: ^0.69.0

  # Export
  pdf: ^3.12.0
  printing: ^5.14.3
  syncfusion_flutter_xlsio: ^32.2.8

  # Utils
  shared_preferences: ^2.3.3
  crypto: ^3.0.5
  file_picker: ^10.3.10

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/images/
    - assets/fonts/
  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700
